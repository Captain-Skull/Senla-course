services:
  db:
    image: postgres:15-alpine
    container_name: pas-db
    environment:
      POSTGRES_DB: pas_db
      POSTGRES_USER: pas_user
      POSTGRES_PASSWORD: pas_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pas_user -d pas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pas-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/pas_db
      DB_USER: pas_user
      DB_PASSWORD: pas_password
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    ports:
      - "8081:8080"
    networks:
      - pas-network

volumes:
  postgres_data:

networks:
  pas-network:
    driver: bridge